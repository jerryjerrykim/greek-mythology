    <style>
        :root { --primary: #3498db; --accent: #e67e22; --bg: #f8f9fa; --text: #2c3e50; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; display: flex; background-color: var(--bg); }
        #canvas { flex-grow: 1; height: 100vh; cursor: grab; background: radial-gradient(#ffffff 0%, #ececec 100%); }
        #sidebar { 
            width: 350px; background: white; border-left: 1px solid #dee2e6; 
            padding: 25px; box-shadow: -5px 0 15px rgba(0,0,0,0.05); 
            overflow-y: auto; z-index: 10;
        }
        h2 { color: var(--text); border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        .search-container { margin-bottom: 20px; display: flex; gap: 8px; }
        #search-input { flex: 1; padding: 10px; border: 1px solid #ced4da; border-radius: 8px; }
        button { padding: 0 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #info-card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #f0f0f0; }
        #char-img-container { width: 100%; height: 220px; background: #eee; border-radius: 8px; margin-bottom: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #char-img { width: 100%; height: 100%; object-fit: contain; display: none; }
        .node circle { stroke: #fff; stroke-width: 2px; transition: all 0.3s; }
        .node text { font-size: 13px; font-weight: 600; fill: #333; text-shadow: 0 1px 2px white; }
        .link { stroke: #cbd5e0; stroke-opacity: 0.6; }
    </style>
</head>

const sidebarWidth = 350;
let width = window.innerWidth - sidebarWidth;
let height = window.innerHeight;

// --- 1. 데이터 클렌징 (핵심 수정) ---
// links의 source/target 문자열을 nodes의 실제 객체 참조로 변환
const validNodeIds = new Set(data.nodes.map(n => n.id));
data.links = data.links.filter(l => validNodeIds.has(l.source) && validNodeIds.has(l.target));

// 연결성 계산 (크기 조절용)
data.nodes.forEach(n => {
    n.count = data.links.filter(l => l.source === n.id || l.target === n.id).length;
    n.x = Math.random() * width; // 초기 뭉침 방지
    n.y = Math.random() * height;
});

const svg = d3.select("#canvas").attr("width", width).attr("height", height);
const container = svg.append("g");

const zoom = d3.zoom().scaleExtent([0.1, 5]).on("zoom", (e) => container.attr("transform", e.transform));
svg.call(zoom);

     // 시뮬레이션 최적화 (외톨이 방지 로직 포함)
const simulation = d3.forceSimulation(data.nodes)
    .force("link", d3.forceLink(data.links).id(d => d.id).distance(100))
    .force("charge", d3.forceManyBody().strength(-1000)) // 밀어내는 힘 약화
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("x", d3.forceX(width / 2).strength(0.1)) // 외톨이를 가로 중앙으로 당김
    .force("y", d3.forceY(height / 2).strength(0.1)) // 외톨이를 세로 중앙으로 당김
    .force("collision", d3.forceCollide().radius(35));

// --- 3. 렌더링 ---
const link = container.append("g").selectAll("line")
    .data(data.links).join("line").attr("class", "link")
    .attr("stroke-width", d => Math.sqrt(d.value) + 1.5);

const node = container.append("g").selectAll("g")
    .data(data.nodes).join("g").attr("class", "node")
    .on("click", (event, d) => focusNode(d))
    .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

node.append("circle")
    .attr("r", d => 10 + Math.min(d.count * 1.5, 20))
    .attr("fill", d => d.count > 12 ? "#e74c3c" : "#3498db");

node.append("text")
    .attr("dy", d => 20 + Math.min(d.count * 1.5, 20))
    .attr("text-anchor", "middle")
    .text(d => d.id.split('(')[0]);

simulation.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// --- 4. 인터랙션 함수 ---
function focusNode(d) {
    // 하이라이트 효과
    const connectedNodeIds = new Set([d.id]);
    data.links.forEach(l => {
        if (l.source.id === d.id) connectedNodeIds.add(l.target.id);
        if (l.target.id === d.id) connectedNodeIds.add(l.source.id);
    });

    node.transition().duration(400).style("opacity", n => connectedNodeIds.has(n.id) ? 1 : 0.1);
    link.transition().duration(400).style("stroke-opacity", l => (l.source.id === d.id || l.target.id === d.id) ? 1 : 0.05);

    // 사이드바 업데이트
    document.getElementById("char-name").innerText = d.id;
    const rels = data.links.filter(l => l.source.id === d.id || l.target.id === d.id);
    document.getElementById("char-desc").innerHTML = rels.length > 0 
        ? [...new Set(rels.map(r => r.description))].map(s => `<p>• ${s}</p>`).join("")
        : "상세 정보가 없습니다.";

    updateSidebarImage(d.id);

    // 중앙 이동
    const scale = 1.0;
    svg.transition().duration(750).call(
        zoom.transform,
        d3.zoomIdentity.translate(width / 2 - d.x * scale, height / 2 - d.y * scale).scale(scale)
    );
}

async function updateSidebarImage(name) {
    const img = document.getElementById("char-img");
    const label = document.getElementById("img-loading"); // 상단 로딩 메시지
    const titleDisplay = document.getElementById("char-title"); // 하단 작품 제목

    // 초기화
    img.style.display = "none";
    label.innerText = "예술 작품을 찾는 중...";
    titleDisplay.innerText = "";

    const enMatch = name.match(/\(([^)]+)\)/);
    const searchTerm = enMatch ? enMatch[1].trim() : name.split('(')[0].trim();

    try {
        // 1단계: The Met API 검색
        const metSearchRes = await fetch(`https://collectionapi.metmuseum.org/public/collection/v1/search?q=${encodeURIComponent(searchTerm)}&hasImages=true`);
        const metSearchData = await metSearchRes.json();

        if (metSearchData.total > 0) {
            const objectId = metSearchData.objectIDs[0];
            const metObjRes = await fetch(`https://collectionapi.metmuseum.org/public/collection/v1/objects/${objectId}`);
            const metObjData = await metObjRes.json();

            if (metObjData.primaryImageSmall) {
                img.src = metObjData.primaryImageSmall;
                img.onload = () => {
                    img.style.display = "block";
                    label.innerText = "작품 로드 완료"; // 상단 메시지 변경
                    titleDisplay.innerText = `Work: ${metObjData.title}`; // 이미지 하단에 제목 표시
                };
                return;
            }
        }

        // 2단계: 위키피디아 폴백
        const wikiRes = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(searchTerm)}`);
        const wikiData = await wikiRes.json();
        
        if (wikiData.thumbnail) {
            img.src = wikiData.thumbnail.source;
            img.onload = () => {
                img.style.display = "block";
                label.innerText = "Wikipedia 정보";
                titleDisplay.innerText = "Source: Wikimedia Commons";
            };
        } else {
            label.innerText = "검색 결과 없음";
            titleDisplay.innerText = "관련 이미지를 찾을 수 없습니다.";
        }
    } catch (e) {
        label.innerText = "오류 발생";
        console.error(e);
    }
}


function searchNode() {
    const val = document.getElementById("search-input").value.trim().toLowerCase();
    const target = data.nodes.find(n => n.id.toLowerCase().includes(val));
    if (target) focusNode(target);
}

function dragstarted(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragended(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

window.addEventListener('resize', () => {
    width = window.innerWidth - sidebarWidth;
    height = window.innerHeight;
    svg.attr("width", width).attr("height", height);
    simulation.force("center", d3.forceCenter(width / 2, height / 2)).restart();
});

// 초기 구동 시 화면 중앙에 배치되도록 살짝 대기 후 실행
setTimeout(() => {
    svg.call(zoom.transform, d3.zoomIdentity.translate(0, 0).scale(0.7));
}, 500);
</script>
