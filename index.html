<!DOCTYPE html>

    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; display: flex; background-color: #f8f9fa; }
        #canvas { flex-grow: 1; height: 100vh; cursor: grab; }
        #canvas:active { cursor: grabbing; }
        
        #sidebar { 
            width: 350px; background: white; border-left: 1px solid #dee2e6; 
            padding: 25px; box-shadow: -2px 0 10px rgba(0,0,0,0.05); 
            overflow-y: auto; display: flex; flex-direction: column;
        }
        
        h2 { color: #2c3e50; margin-top: 0; font-size: 1.5rem; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .search-container { margin-bottom: 20px; display: flex; gap: 5px; }
        #search-input { flex: 1; padding: 10px; border: 1px solid #ced4da; border-radius: 4px; outline: none; }
        button { padding: 10px 15px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #2980b9; }

        /* 선(Link) 스타일 */
        .link { stroke: #adb5bd; stroke-opacity: 0.3; transition: stroke 0.3s; }
        .node { stroke: #fff; stroke-width: 1.5px; cursor: pointer; transition: r 0.3s, fill 0.3s; }
        .label { pointer-events: none; font-size: 11px; fill: #495057; font-weight: 500; }

        /* 노드(Node) 스타일 */
        .node { stroke: #fff; stroke-width: 1.5px; cursor: pointer; transition: r 0.3s, fill 0.3s; }
        .label { pointer-events: none; font-size: 11px; fill: #495057; font-weight: 500; }

        .info-box { 
            background: #f1f3f5; padding: 15px; border-radius: 8px; 
            margin-top: 20px; line-height: 1.6; font-size: 14px; color: #343a40;
            border-left: 5px solid #3498db;
        }
    </style>
</head>
<body>

<div id="canvas"></div>

<div id="sidebar">
    <h2>인물 검색</h2>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="이름 일부만 입력해도 검색 가능">
        <button onclick="searchNode()">검색</button>
    </div>
    
    <div id="info-panel">

const width = window.innerWidth - 350;
const height = window.innerHeight;

const svg = d3.select("#canvas").append("svg").attr("width", width).attr("height", height);
const container = svg.append("g");


// Zoom 설정
const zoom = d3.zoom()
    .scaleExtent([0.1, 5])
    .on("zoom", (event) => container.attr("transform", event.transform));
svg.call(zoom);

// 시뮬레이션 최적화 (외톨이 방지 로직 포함)
const simulation = d3.forceSimulation(data.nodes)
    .force("link", d3.forceLink(data.links).id(d => d.id).distance(150))
    .force("charge", d3.forceManyBody().strength(-1000)) // 밀어내는 힘 약화
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("x", d3.forceX(width / 2).strength(0.1)) // 외톨이를 가로 중앙으로 당김
    .force("y", d3.forceY(height / 2).strength(0.1)) // 외톨이를 세로 중앙으로 당김
    .force("collision", d3.forceCollide().radius(35));

// 링크 생성 (가중치에 따른 굵기 반영)
const link = container.append("g")
    .selectAll("line")
    .data(data.links)
    .join("line")
    .attr("class", "link")
    // 1. 선의 굵기 (기존 로직 유지)
    .style("stroke-width", d => Math.sqrt(d.value || 1) * 1 + 1)
    // 2. 가중치에 따른 색상 부여
    .style("stroke", d => {
        if (d.value >= 5) return "#3498db"; // 빈도 5 이상: 진한 주황색 (핵심 관계)
        if (d.value >= 2) return "#e67e22"; // 빈도 2~4: 파란색 (주요 관계)
        return "#adb5bd";                   // 빈도 1: 연한 회색 (일반 관계)
    })
    // 3. 가중치가 높을수록 선명하게 (투명도 조절)
    .style("stroke-opacity", d => {
        if (d.value >= 5) return 0.8;
        if (d.value >= 2) return 0.5;
        return 0.3;
    });

// 노드 그리기 (연결성에 따른 크기 반영)
const node = container.append("g")
    .selectAll("circle")
    .data(data.nodes)
    .join("circle")
    .attr("class", "node")
    // 기본 반지름 8 + 연결성(degree)의 제곱근에 비례하여 증가
    .attr("r", d => Math.sqrt(d.degree) * 5 + 8) 
    .attr("fill", "#3498db")
    .on("click", (event, d) => focusNode(d))
    .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));
    
// 라벨 생성
const label = container.append("g")
    .selectAll("text")
    .data(data.nodes)
    .join("text")
    .attr("class", "label")
    .text(d => d.id)
    .attr("dx", 16)
    .attr("dy", 4);

simulation.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("cx", d => d.x).attr("cy", d => d.y);
    label.attr("x", d => d.x).attr("y", d => d.y);
});

// 핵심 기능: 인물 포커스 및 정보 표시
function focusNode(d) {
    // 시각적 강조 초기화 및 재설정
    node.transition().duration(500).attr("fill", "#3498db").attr("r", 12);
    const selected = node.filter(n => n.id === d.id);
    selected.transition().duration(500).attr("fill", "#e67e22").attr("r", 20);

    // 사이드바 업데이트
    document.getElementById("selected-name").innerText = d.id;
    const interactions = data.links.filter(l => l.source.id === d.id || l.target.id === d.id);
    
    if (interactions.length > 0) {
        const uniqueDescs = [...new Set(interactions.map(l => l.description))];
        document.getElementById("info-text").innerHTML = `<div class='info-box'>${uniqueDescs.join("<br><br>")}</div>`;
    } else {
        document.getElementById("info-text").innerHTML = "<p>기록된 상호작용 정보가 없습니다.</p>";
    }

    // 중앙 이동 (Smooth Zoom)
    const scale = 1.5;
    svg.transition().duration(1000).call(
        zoom.transform,
        d3.zoomIdentity.translate(width / 2 - d.x * scale, height / 2 - d.y * scale).scale(scale)
    );
}

// 검색 기능 (부분 일치 검색 최적화)
function searchNode() {
    const name = document.getElementById("search-input").value.trim().toLowerCase();
    if (!name) return;

    // 이름의 일부라도 포함되어 있으면 첫 번째 노드 선택
    const target = data.nodes.find(n => n.id.toLowerCase().includes(name));
    
    if (target) {
        focusNode(target);
    } else {
        alert(`'${name}'(을)를 포함한 인물을 찾을 수 없습니다.`);
    }
}

// 엔터키 지원
document.getElementById("search-input").addEventListener("keypress", (e) => {
    if (e.key === "Enter") searchNode();
});

function dragstarted(event) { if (!event.active) simulation.alphaTarget(0.3).restart(); event.subject.fx = event.subject.x; event.subject.fy = event.subject.y; }
function dragged(event) { event.subject.fx = event.x; event.subject.fy = event.y; }
function dragended(event) { if (!event.active) simulation.alphaTarget(0); event.subject.fx = null; event.subject.fy = null; }
</script>

</body>
